@keyframes g2{0%,83%,100%{opacity:0;transform:translate(0,0)}84%{opacity:.65;transform:translate(4px,-1px)}85.5%{opacity:.4;transform:translate(-4px,1px)}87%{opacity:0;transform:translate(0,0)}}
@keyframes g3{0%,92%,100%{opacity:0;transform:translate(0,0)}93%{opacity:.5;transform:translate(-3px,2px)}94%{opacity:0;transform:translate(0,0)}}
