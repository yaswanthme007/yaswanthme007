<rect x="13" y="169" width="3" height="3" fill="#EDE4C8" opacity="0.5" style="animation:dot 1.2s step-end infinite 0.3s"/>
<rect x="814" y="169" width="3" height="3" fill="#EDE4C8" opacity="0.5" style="animation:dot 1.2s step-end infinite 0.9s"/>

